name: Build Unsigned iOS IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          # 精准锁定原作者项目适配的 Flutter 版本，避免版本冲突
          flutter-version: '3.24.5'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: |
          cd simple_live_app
          flutter pub get

      - name: Build Flutter iOS (No Codesign)
        run: |
          cd simple_live_app
          # 加上 --no-pub 确保不重复拉取依赖，直接进行无签名编译
          flutter build ios --release --no-codesign --no-pub

      - name: Create Payload Directory and Move App
        run: |
          mkdir -p Payload
          mv simple_live_app/build/ios/iphoneos/Runner.app Payload/
          zip -r simple_live_live.ipa Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-app-unsigned
          path: simple_live_live.ipa
